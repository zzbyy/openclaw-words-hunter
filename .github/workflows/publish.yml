name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Pack and upload tarball
        run: |
          set -euo pipefail
          # npm pack prints the tarball path; pick the .tgz line (avoids npm notice noise)
          TARBALL=$(npm pack 2>&1 | grep -E 'words-hunter-openclaw-.+\.tgz$' | tail -n1)
          if [ ! -f "$TARBALL" ]; then
            echo "npm pack did not produce $TARBALL"
            ls -la
            exit 1
          fi
          cp "$TARBALL" words-hunter-openclaw.tgz
          # Stable name for README/install.sh; keep semver-named asset too
          gh release upload "${{ github.event.release.tag_name }}" \
            words-hunter-openclaw.tgz \
            "$TARBALL" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

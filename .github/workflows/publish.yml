name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Pack tarball
        run: npm pack

      - name: Upload tarball to release
        run: |
          TARBALL=$(ls words-hunter-openclaw-*.tgz)
          cp "$TARBALL" words-hunter-openclaw.tgz
          gh release upload "${{ github.event.release.tag_name }}" words-hunter-openclaw.tgz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
